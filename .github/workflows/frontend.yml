name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**' # Only runs when you change frontend files
  workflow_dispatch: # Adds a button to let you run it manually!

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          
      - name: Build And Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend" # Tells Azure where your HTML/JS lives
          api_location: "" # Left blank because your Python API is hosted separately
          output_location: "" # Left blank because standard HTML doesn't require a build output folder